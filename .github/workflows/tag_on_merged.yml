name: Build & Auto-Release from main

on:
  push:
    branches-ignore: [main]
    # paths-ignore:
    #   - '.github/workflows/**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]
    branches: [main]        # Fire only for PRs targeting main
    paths-ignore:
      - '.github/workflows/**'

permissions:
  contents: write           # Needed to create tags and releases
  pull-requests: write      # Needed to comment on PR for tag conflicts

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  check-tag-availability:
    outputs:
      tag: ${{ steps.tag.outputs.value }}
      tag_exists: ${{ steps.tag_exists.outputs.exists }}
    if: |
      ((github.event_name == 'pull_request') ||
      (github.event_name == 'push' && github.ref_name != 'main')
      ) && (github.event_name != 'pull_request' || !contains(github.event.pull_request.user.login, 'dependabot'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merged == true && 'main' || github.ref_name }}

      - name: Extract version from pyproject.toml
        id: version
        shell: bash
        run: |
          python3 - <<'PY' > .version
          import pathlib, sys
          try:
              import tomllib  # Python 3.11+
          except Exception as e:
              sys.exit(f"tomllib not available: {e}")
          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          v = (data.get("project", {}).get("version")
               or data.get("tool", {}).get("poetry", {}).get("version"))
          if not v:
              raise SystemExit("No version found in pyproject.toml (project.version or tool.poetry.version).")
          print(v)
          PY
          echo "value=$(cat .version)" >> "$GITHUB_OUTPUT"

      - name: Compute tag name (prefix with 'v')
        id: tag
        run: |
          v="${{ steps.version.outputs.value }}"
          if [[ "$v" != v* ]]; then tag="v$v"; else tag="$v"; fi
          echo "value=$tag" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists (local or remote)
        id: tag_exists
        run: |
          tag="${{ steps.tag.outputs.value }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --tags --force --prune
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR when release tag already exists
        if: steps.tag_exists.outputs.exists == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.value }}"
          pr_number="${{ github.event.pull_request.number }}"
          gh pr comment "$pr_number" --body "Release tag $tag already exists. Please bump version in pyproject.toml to a new version before merging."

      - name: Fail when release tag already exists
        if: |
          ((github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
          (github.event_name == 'push' && github.ref_name != 'main')) &&
          steps.tag_exists.outputs.exists == 'true'
        run: |
          tag="${{ steps.tag.outputs.value }}"
          echo "Release tag $tag already exists; failing this check to block merge."
          exit 1

  build-tag-release:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && !contains(github.event.pull_request.user.login, 'dependabot') && needs.check-tag-availability.outputs.tag_exists == 'false'
    needs: check-tag-availability
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main (post-merge)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0      # fetch all history & tags (needed for tagging)

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build wheel
        run: python -m build

      - name: Determine wheel asset
        id: wheel
        run: |
          w=$(ls -1 dist/*.whl | head -n 1)
          if [[ -z "$w" ]]; then
            echo "No wheel artifact found in dist/"
            exit 1
          fi
          echo "path=$w" >> "$GITHUB_OUTPUT"

      - name: Configure git author (for tagging)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push annotated tag
        run: |
          tag="${{ needs.check-tag-availability.outputs.tag }}"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Create or update GitHub Release and upload wheel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.check-tag-availability.outputs.tag }}"
          wheel="${{ steps.wheel.outputs.path }}"
          ruff_config=".ruff.toml"
          # Mark prereleases if version looks like a/b/rc (PEP 440-ish)
          prerelease_flag=""
          if [[ "$tag" =~ a[0-9]*$ || "$tag" =~ b[0-9]*$ || "$tag" =~ rc[0-9]*$ ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "$tag" "$wheel" "$ruff_config" \
            --title "$tag" \
            --generate-notes $prerelease_flag
