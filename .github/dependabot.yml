version: 2
updates:
  - package-ecosystem: "pip"
    cooldown:
      default-days: 7
    directory: "/"  
    schedule:
      interval: "weekly"
  - package-ecosystem: "uv"
    cooldown:
      default-days: 7
    directory: "/"  
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    cooldown:
      default-days: 7
    directory: "/"  # Location of workflow files
    schedule:
      interval: "weekly"
